name: Android PR

on:
  pull_request:
    branches:
      - main

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          pattern='^(feat|fix|refactor|docs|ci|build|chore|perf|test|revert)(\([^)]+\))?!?: .+'
          if ! printf '%s\n' "$PR_TITLE" | grep -Eq "$pattern"; then
            echo "PR title must follow Conventional Commits, for example: feat: add Drive sync"
            exit 1
          fi

  build-and-test:
    needs: validate-pr-title
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
